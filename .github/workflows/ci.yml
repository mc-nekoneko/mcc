name: Check runtime images

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: mcc-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Run fixture tests
        run: bash tests/run.sh
      - name: Run ShellCheck
        run: shellcheck scripts/*.sh .docker/entrypoint.sh tests/*.sh

  build:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Resolve exact Velocity release
        id: resolve
        run: |
          scripts/resolve-papermc.sh \
            --project velocity \
            --track current \
            --version 3.5.1 \
            --build 615 > manifest.json
          {
            echo "java_image=$(jq -r .java_image manifest.json)"
            echo "url=$(jq -r .url manifest.json)"
            echo "sha256=$(jq -r .sha256 manifest.json)"
            echo "jvm_flags=$(jq -r '.jvm_flags | join(" ")' manifest.json)"
          } >> "$GITHUB_OUTPUT"
      - name: Build both architectures without pushing
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: .docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          outputs: type=oci,dest=/tmp/mcc-velocity.tar
          provenance: false
          sbom: false
          build-args: |
            JAVA_IMAGE=${{ steps.resolve.outputs.java_image }}
            PAPERMC_PROJECT=velocity
            PAPERMC_VERSION=3.5.1
            PAPERMC_BUILD=615
            PAPERMC_DOWNLOAD_URL=${{ steps.resolve.outputs.url }}
            PAPERMC_DOWNLOAD_SHA256=${{ steps.resolve.outputs.sha256 }}
            JVM_FLAGS=${{ steps.resolve.outputs.jvm_flags }}
