name: Publish exact runtime image

on:
  workflow_dispatch:
    inputs:
      project:
        description: PaperMC project
        type: choice
        options: [velocity, paper]
        required: true
      track:
        description: Lifecycle track
        type: choice
        options: [current, previous, legacy, preview, custom]
        required: true
      version:
        description: Exact upstream version
        type: string
        required: true
      build:
        description: Exact build; blank selects the newest allowed channel
        type: string
        required: false
      jre:
        description: JRE override; blank uses policy or Fill minimum
        type: string
        required: false
      move_aliases:
        description: Move aliases allowed by the selected configured track
        type: boolean
        default: false
        required: true
  workflow_call:
    inputs:
      project: { type: string, required: true }
      track: { type: string, required: true }
      version: { type: string, required: true }
      build: { type: string, required: false, default: '' }
      jre: { type: string, required: false, default: '' }
      move_aliases: { type: boolean, required: false, default: false }

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-${{ inputs.project }}-${{ inputs.track }}-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      metadata: ${{ steps.resolve.outputs.metadata }}
      alias_tags: ${{ steps.resolve.outputs.alias_tags }}
      image: ${{ steps.resolve.outputs.image }}
      canonical_ref: ${{ steps.resolve.outputs.canonical_ref }}
      existing_digest: ${{ steps.resolve.outputs.existing_digest }}
      publish_required: ${{ steps.resolve.outputs.publish_required }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Resolve and validate immutable inputs
        id: resolve
        env:
          PROJECT: ${{ inputs.project }}
          TRACK: ${{ inputs.track }}
          VERSION: ${{ inputs.version }}
          BUILD: ${{ inputs.build }}
          JRE: ${{ inputs.jre }}
          MOVE_ALIASES: ${{ inputs.move_aliases }}
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          args=(--project "$PROJECT" --track "$TRACK" --version "$VERSION")
          [[ -z "$BUILD" ]] || args+=(--build "$BUILD")
          [[ -z "$JRE" ]] || args+=(--jre "$JRE")
          scripts/resolve-papermc.sh "${args[@]}" > manifest.json
          image="ghcr.io/${GITHUB_REPOSITORY}/${PROJECT}"
          canonical_ref="$image:$(jq -r .canonical_tag manifest.json)"
          jq -e . manifest.json
          printf '%s' "$REGISTRY_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          if existing_digest=$(docker buildx imagetools inspect "$canonical_ref" --format '{{json .Manifest.Digest}}' 2> inspect-error.txt); then
            existing_digest=${existing_digest//\"/}
            publish_required=false
          elif grep -Eqi 'not found|manifest unknown' inspect-error.txt; then
            existing_digest=
            publish_required=true
          else
            cat inspect-error.txt >&2
            exit 1
          fi
          {
            echo "metadata=$(jq -c . manifest.json)"
            echo "image=$image"
            echo "canonical_ref=$canonical_ref"
            echo "existing_digest=$existing_digest"
            echo "publish_required=$publish_required"
            echo 'alias_tags<<MCC_TAGS'
            jq -r --arg image "$image" --argjson move "$MOVE_ALIASES" '
              [.compatibility_tags[] | $image + ":" + .]
              + (if $move then [.moving_tags[] | $image + ":" + .] else [] end)
              | unique[]
            ' manifest.json
            echo MCC_TAGS
          } >> "$GITHUB_OUTPUT"

  publish:
    needs: resolve
    if: needs.resolve.outputs.publish_required == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish immutable index
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: .docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ needs.resolve.outputs.canonical_ref }}
          sbom: true
          provenance: mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ fromJSON(needs.resolve.outputs.metadata).canonical_tag }}
          build-args: |
            JAVA_IMAGE=${{ fromJSON(needs.resolve.outputs.metadata).java_image }}
            PAPERMC_PROJECT=${{ fromJSON(needs.resolve.outputs.metadata).project }}
            PAPERMC_VERSION=${{ fromJSON(needs.resolve.outputs.metadata).version }}
            PAPERMC_BUILD=${{ fromJSON(needs.resolve.outputs.metadata).build }}
            PAPERMC_DOWNLOAD_URL=${{ fromJSON(needs.resolve.outputs.metadata).url }}
            PAPERMC_DOWNLOAD_SHA256=${{ fromJSON(needs.resolve.outputs.metadata).sha256 }}
            JVM_FLAGS=${{ join(fromJSON(needs.resolve.outputs.metadata).jvm_flags, ' ') }}
      - name: Record image attestation
        env:
          METADATA: ${{ needs.resolve.outputs.metadata }}
          IMAGE: ${{ needs.resolve.outputs.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
          CANONICAL_REF: ${{ needs.resolve.outputs.canonical_ref }}
          ALIAS_TAGS: ${{ needs.resolve.outputs.alias_tags }}
        run: |
          jq -n \
            --argjson metadata "$METADATA" \
            --arg image "$IMAGE" \
            --arg digest "$DIGEST" \
            --arg canonical_ref "$CANONICAL_REF" \
            --arg alias_tags "$ALIAS_TAGS" \
            --arg source_sha "$GITHUB_SHA" \
            '{metadata:$metadata,image:$image,digest:$digest,tags:([$canonical_ref] + ($alias_tags|split("\n"))),source_sha:$source_sha}' \
            > image-attestation.json
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: ${{ inputs.project }}-${{ inputs.version }}-${{ fromJSON(needs.resolve.outputs.metadata).build }}-attestation
          path: image-attestation.json
          if-no-files-found: error

  aliases:
    needs: [resolve, publish]
    if: always() && needs.resolve.result == 'success' && (needs.publish.result == 'success' || needs.publish.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      digest: ${{ steps.digest.outputs.digest }}
    steps:
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Select immutable digest
        id: digest
        env:
          EXISTING_DIGEST: ${{ needs.resolve.outputs.existing_digest }}
          PUBLISHED_DIGEST: ${{ needs.publish.outputs.digest }}
        run: |
          digest=${EXISTING_DIGEST:-$PUBLISHED_DIGEST}
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
      - name: Point allowed aliases at the immutable index
        env:
          IMAGE: ${{ needs.resolve.outputs.image }}
          DIGEST: ${{ steps.digest.outputs.digest }}
          ALIAS_TAGS: ${{ needs.resolve.outputs.alias_tags }}
        run: |
          while IFS= read -r tag; do
            [[ -z "$tag" ]] || docker buildx imagetools create --tag "$tag" "$IMAGE@$DIGEST"
          done <<< "$ALIAS_TAGS"

  verify:
    needs: [resolve, aliases]
    if: always() && needs.resolve.result == 'success' && needs.aliases.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify index, attestations, startup, and TERM
        env:
          IMAGE: ${{ needs.resolve.outputs.image }}
          DIGEST: ${{ needs.aliases.outputs.digest }}
          METADATA: ${{ needs.resolve.outputs.metadata }}
        run: |
          set -euo pipefail
          reference="$IMAGE@$DIGEST"
          index=$(docker buildx imagetools inspect "$reference" --raw)
          amd64=$(jq '[.manifests[] | select(.platform.os == "linux" and .platform.architecture == "amd64")] | length' <<< "$index")
          arm64=$(jq '[.manifests[] | select(.platform.os == "linux" and .platform.architecture == "arm64")] | length' <<< "$index")
          attestations=$(jq -r '.manifests[] | select(.platform.os == "unknown") | .digest' <<< "$index")
          [[ "$amd64" == 1 && "$arm64" == 1 ]]
          [[ "$(wc -l <<< "$attestations")" -eq 2 ]]
          while IFS= read -r attestation; do
            predicates=$(docker buildx imagetools inspect "$IMAGE@$attestation" --raw \
              | jq -r '[.layers[].annotations["in-toto.io/predicate-type"]] | sort | join(",")')
            [[ "$predicates" == "https://slsa.dev/provenance/v1,https://spdx.dev/Document" ]]
          done <<< "$attestations"

          docker pull --platform linux/amd64 "$reference"
          expected_sha=$(jq -r .sha256 <<< "$METADATA")
          docker run --rm --platform linux/amd64 --entrypoint /bin/bash "$reference" -lc \
            'cat /opt/papermc/server.env; sha256sum /opt/papermc/server.jar' \
            | tee /tmp/runtime-metadata.txt
          grep -q "SHA256=$expected_sha" /tmp/runtime-metadata.txt
          grep -q "$expected_sha  /opt/papermc/server.jar" /tmp/runtime-metadata.txt

          container=mcc-runtime-verify
          runtime_home=/tmp/mcc-runtime-home
          mkdir -p "$runtime_home"
          chmod 777 "$runtime_home"
          printf 'eula=true\n' > "$runtime_home/eula.txt"
          chmod 666 "$runtime_home/eula.txt"
          trap 'docker rm -f "$container" >/dev/null 2>&1 || true' EXIT
          docker run -d --platform linux/amd64 --name "$container" \
            -e SERVER_MEMORY=1G -v "$runtime_home:/home/minecraft" "$reference"
          ready=false
          for _ in $(seq 1 60); do
            if docker logs "$container" 2>&1 | grep -Eq 'Done|Listening on'; then
              ready=true
              break
            fi
            [[ "$(docker inspect -f '{{.State.Running}}' "$container")" == true ]] || break
            sleep 1
          done
          docker logs "$container"
          [[ "$ready" == true ]]
          started=$(date +%s)
          docker stop --time 10 "$container" >/dev/null
          stopped=$(date +%s)
          stop_latency=$((stopped - started))
          exit_code=$(docker inspect -f '{{.State.ExitCode}}' "$container")
          docker logs "$container"
          printf 'TERM stop latency=%ss exit_code=%s\n' "$stop_latency" "$exit_code"
          [[ "$stop_latency" -lt 10 ]]
          [[ "$exit_code" == 0 || "$exit_code" == 143 ]]
